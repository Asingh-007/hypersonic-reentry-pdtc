name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare and bootstrap vcpkg
        # windows-latest runners already have vcpkg preinstalled at C:/vcpkg
        run: |
          if (Test-Path "C:/vcpkg/.git") {
            git -C C:/vcpkg fetch --unshallow origin 2>$null
            git -C C:/vcpkg fetch origin
            git -C C:/vcpkg checkout master
            git -C C:/vcpkg reset --hard origin/master
          } else {
            Remove-Item -Recurse -Force C:/vcpkg -ErrorAction SilentlyContinue
            git clone https://github.com/microsoft/vcpkg C:/vcpkg
          }
          C:/vcpkg/bootstrap-vcpkg.bat

      - name: Configure
        run: cmake --preset default

      - name: Build
        run: cmake --build --preset default

      - name: Run tests
        run: ctest --test-dir build -C Debug --output-on-failure
